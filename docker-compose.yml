services:
  traefik:
    image: traefik:v3.6.13
    volumes:
      - ./traefik/etc:/etc/traefik:ro
      - ./traefik/data:/data:ro
    ports:
      - "443:443"
      - "80:80"
    restart: always
    networks:
      site-net:
        ipv4_address: 172.18.0.2

  site-public:
    image: nginx:alpine
    volumes:
      - ./nginx/conf.d/defaults.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/conf.d/cache.conf:/etc/nginx/conf.d/cache.conf:ro
      - ./public-website/html:/usr/share/nginx/html:ro
      - ./nginx/saw-mail-rz-ev.txt:/email/saw-mail-rz-ev.txt:ro
      - nginx-cache:/var/cache/nginx
    restart: always
    networks:
      site-net:
        ipv4_address: 172.18.0.3

volumes:
  nginx-cache:

networks:
  # We explicitly configure dockers container network here so we can give nginx a static IP for treafik
  site-net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.18.0.0/16
