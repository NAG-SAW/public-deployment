services:
  traefik:
    image: traefik:v3.6.2
    volumes:
      - ./traefik/etc:/etc/traefik:ro
      - ./traefik/data:/data:ro
    ports:
      - "443:443"
      - "80:80"
    restart: always

  site-public:
    image: nginx:alpine
    volumes:
      - ./nginx/conf.d/defaults.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public-website/html:/usr/share/nginx/html:ro
      - ./saw-mail-rz-ev.txt:/email/saw-mail-rz-ev.txt:ro
    restart: always
