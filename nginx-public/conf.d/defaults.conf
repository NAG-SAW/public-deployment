server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # trust Traefik (internal docker IP) for forwarded client IPs
    set_real_ip_from 172.18.0.2;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Hides server information (e.g. nginx version) in responses
    server_tokens off;

    # Access Logs are handled by traefik
    access_log off;

    # Disallow files.publii.json
    location ~ /files.publii.json {
        deny all;
        return 404;
    }

    # Include /email/saw-mail-rz-ev.txt from external folder
    location ~ /email/saw-mail-rz-ev.txt {
        # Allow RWTH Mailserver and NAG subnet for debugging
        allow 134.130.54.67;
        allow 10.10.12.0/24;
        deny all;
        alias /email/saw-mail-rz-ev.txt;
    }

    # Proxy cache for Overpass API with long-lived cache and stale content fallback, since API is down often
    location /overpass/api/interpreter {
        proxy_pass https://overpass.private.coffee/api/interpreter;

        # Add header to get cache state
        add_header X-Cache-Status $upstream_cache_status;

        # Cache configuration
        proxy_cache overpass_cache;
        proxy_cache_valid 200 1d;
        proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_methods GET HEAD;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Serve all files
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
    }

    error_page  404  /404.html;
}
